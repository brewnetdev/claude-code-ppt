<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <g font-family="Pretendard, 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">

    <text x="40" y="52" font-size="26" font-weight="800" fill="#1F2937">컨텍스트 윈도우의 구조와 KV-cache</text>
    <text x="40" y="84" font-size="16" fill="#6B7280">안정 접두어는 앞에, 변하는 것은 뒤에 — 접두어 토큰 하나만 바뀌어도 이후 캐시가 전부 무효화된다</text>

    <!-- window bar -->
    <rect x="60" y="130" width="1160" height="120" rx="14" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>

    <!-- stable prefix -->
    <rect x="60" y="130" width="720" height="120" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <rect x="766" y="130" width="14" height="120" fill="#DBEAFE"/>
    <text x="80" y="166" font-size="18" font-weight="800" fill="#1E40AF">안정 접두어 (Stable Prefix) · 캐시됨 🔒</text>
    <text x="80" y="196" font-size="14" fill="#1E3A8A">시스템 프롬프트 · 에이전트 정체성 · 도구 정의 · 스킬 목록 · 장기 요약</text>
    <text x="80" y="224" font-size="14" font-weight="700" fill="#16A34A">→ 재계산 없이 재사용, 캐시 히트 시 비용 약 1/10</text>

    <!-- variable suffix -->
    <rect x="780" y="130" width="440" height="120" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="800" y="166" font-size="18" font-weight="800" fill="#92400E">동적 접미어 ⚡</text>
    <text x="800" y="196" font-size="14" fill="#78350F">최신 사용자 입력 ·</text>
    <text x="800" y="218" font-size="14" fill="#78350F">새 도구 결과 · 로딩된</text>
    <text x="800" y="240" font-size="14" fill="#78350F">스킬 상세 정의</text>

    <text x="420" y="290" font-size="14" fill="#3B82F6" text-anchor="middle">↑ 자주 변하지 않음 — 고정하라</text>
    <text x="1000" y="290" font-size="14" fill="#B45309" text-anchor="middle">↑ 매 턴 변함 — 뒤에 둬라</text>

    <!-- Anthropic 4 strategies -->
    <text x="60" y="350" font-size="20" font-weight="800" fill="#1F2937">Anthropic 4대 큐레이션 전략 — "정보를 많이"가 아니라 "신호 대 잡음비"를 최적화</text>

    <g>
      <rect x="60" y="375" width="275" height="150" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="80" y="412" font-size="18" font-weight="800" fill="#1E40AF">Write</text>
      <text x="80" y="442" font-size="14" fill="#374151">시스템 프롬프트를</text>
      <text x="80" y="464" font-size="14" fill="#374151">명확·구조화해 작성.</text>
      <text x="80" y="494" font-size="13" fill="#6B7280">"무엇"이 아니라 "어떻게</text>
      <text x="80" y="512" font-size="13" fill="#6B7280">구조화"가 핵심</text>
    </g>
    <g>
      <rect x="350" y="375" width="275" height="150" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
      <text x="370" y="412" font-size="18" font-weight="800" fill="#166534">Select</text>
      <text x="370" y="442" font-size="14" fill="#374151">필요한 문서만 골라</text>
      <text x="370" y="464" font-size="14" fill="#374151">넣는다.</text>
      <text x="370" y="494" font-size="13" fill="#6B7280">Lost-in-the-Middle</text>
      <text x="370" y="512" font-size="13" fill="#6B7280">방지</text>
    </g>
    <g>
      <rect x="640" y="375" width="275" height="150" rx="14" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
      <text x="660" y="412" font-size="18" font-weight="800" fill="#854D0E">Compress</text>
      <text x="660" y="442" font-size="14" fill="#374151">오래된 대화를 요약.</text>
      <text x="660" y="464" font-size="14" fill="#374151">(compaction)</text>
      <text x="660" y="494" font-size="13" fill="#6B7280">정보 보존율 80%+ 로</text>
      <text x="660" y="512" font-size="13" fill="#6B7280">토큰 절감</text>
    </g>
    <g>
      <rect x="930" y="375" width="290" height="150" rx="14" fill="#FEF3F2" stroke="#F97316" stroke-width="1.5"/>
      <text x="950" y="412" font-size="18" font-weight="800" fill="#9A3412">Isolate</text>
      <text x="950" y="442" font-size="14" fill="#374151">서브에이전트에 위임해</text>
      <text x="950" y="464" font-size="14" fill="#374151">메인 컨텍스트를 보호.</text>
      <text x="950" y="494" font-size="13" fill="#6B7280">최소 권한 원칙의</text>
      <text x="950" y="512" font-size="13" fill="#6B7280">컨텍스트 버전</text>
    </g>

    <!-- 40% rule -->
    <rect x="60" y="560" width="1160" height="110" rx="16" fill="#1F2937"/>
    <text x="90" y="602" font-size="19" font-weight="800" fill="#FBBF24">12-Factor Agents · "40% 이상 차면 dumb zone"</text>
    <text x="90" y="636" font-size="15" fill="#E5E7EB">컨텍스트의 40%를 넘기면 지시 따르기 능력이 급격히 떨어진다 — 많이 넣을수록 좋다는 직관과 정반대.</text>
    <text x="90" y="660" font-size="14" fill="#9CA3AF">아이러니 · 2년간 프롬프트를 다듬었지만, 프로덕션에서 중요한 건 접두어를 "건드리지 않는 것"이었다.</text>
  </g>
</svg>
