<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <g font-family="Pretendard, 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">

    <!-- Master title -->
    <text x="40" y="44" font-size="22" font-weight="700" fill="#3A3A36">Grep vs LSP — 심볼 탐색 흐름과 토큰 비용</text>

    <!-- ===================== LEFT BLOCK : two flow columns ===================== -->
    <!-- dashed divider -->
    <line x1="356" y1="135" x2="356" y2="645" stroke="#DCD6CB" stroke-width="1.5" stroke-dasharray="4 6"/>

    <!-- Column A header (LSP 없음) -->
    <rect x="40" y="72" width="300" height="50" rx="10" fill="#E68468"/>
    <text x="190" y="103" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">LSP 없음 (기본 상태)</text>
    <text x="190" y="142" font-size="12" fill="#8A8A82" text-anchor="middle">① "processPayment 정의 어디?"</text>

    <!-- Column B header (LSP 있음) -->
    <rect x="372" y="72" width="300" height="50" rx="10" fill="#59B395"/>
    <text x="522" y="103" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">LSP 있음</text>
    <text x="522" y="142" font-size="12" fill="#8A8A82" text-anchor="middle">① "processPayment 정의 어디?"</text>

    <!-- Column A boxes (cx=190) -->
    <!-- box0 gray -->
    <rect x="40" y="156" width="300" height="100" rx="9" fill="#ECE9E2"/>
    <text x="190" y="196" font-size="16" font-weight="700" fill="#3E3E38" text-anchor="middle">Grep 실행</text>
    <text x="190" y="222" font-size="11.5" fill="#7C7C74" text-anchor="middle">전체 파일 시스템 텍스트 검색</text>
    <!-- arrow -->
    <line x1="190" y1="260" x2="190" y2="284" stroke="#B8B2A8" stroke-width="2"/>
    <path d="M185,279 L195,279 L190,285 Z" fill="#B8B2A8"/>
    <!-- box1 pink -->
    <rect x="40" y="288" width="300" height="100" rx="9" fill="#FCE6E4" stroke="#F0C4BF" stroke-width="1.2"/>
    <text x="190" y="328" font-size="16" font-weight="700" fill="#A23E3A" text-anchor="middle">847개 매치 반환</text>
    <text x="190" y="354" font-size="11" fill="#B06A6A" text-anchor="middle">클래스명·변수·주석·CSS 모두 포함</text>
    <line x1="190" y1="392" x2="190" y2="416" stroke="#B8B2A8" stroke-width="2"/>
    <path d="M185,411 L195,411 L190,417 Z" fill="#B8B2A8"/>
    <!-- box2 pink -->
    <rect x="40" y="420" width="300" height="100" rx="9" fill="#FCE6E4" stroke="#F0C4BF" stroke-width="1.2"/>
    <text x="190" y="460" font-size="16" font-weight="700" fill="#A23E3A" text-anchor="middle">파일 Read (반복)</text>
    <text x="190" y="486" font-size="11" fill="#B06A6A" text-anchor="middle">각 후보 파일 전체 내용을 컨텍스트에 로드</text>
    <line x1="190" y1="524" x2="190" y2="548" stroke="#B8B2A8" stroke-width="2"/>
    <path d="M185,543 L195,543 L190,549 Z" fill="#B8B2A8"/>
    <!-- box3 pink -->
    <rect x="40" y="552" width="300" height="100" rx="9" fill="#FCE6E4" stroke="#F0C4BF" stroke-width="1.2"/>
    <text x="190" y="592" font-size="16" font-weight="700" fill="#A23E3A" text-anchor="middle">정답 추론 (30~60초)</text>
    <text x="190" y="618" font-size="11" fill="#B06A6A" text-anchor="middle">텍스트 패턴 매칭으로 좁혀나감</text>

    <!-- Column B boxes (cx=522) -->
    <!-- box0 gray -->
    <rect x="372" y="156" width="300" height="100" rx="9" fill="#ECE9E2"/>
    <text x="522" y="196" font-size="15" font-weight="700" fill="#3E3E38" text-anchor="middle">LSP goToDefinition 호출</text>
    <text x="522" y="222" font-size="11.5" fill="#7C7C74" text-anchor="middle">언어 서버에 JSON-RPC 요청</text>
    <line x1="522" y1="260" x2="522" y2="284" stroke="#9CC9B8" stroke-width="2"/>
    <path d="M517,279 L527,279 L522,285 Z" fill="#9CC9B8"/>
    <!-- box1 teal -->
    <rect x="372" y="288" width="300" height="100" rx="9" fill="#DEEFE8" stroke="#B6DCCD" stroke-width="1.2"/>
    <text x="522" y="328" font-size="16" font-weight="700" fill="#2E7D63" text-anchor="middle">AST에서 즉시 조회</text>
    <text x="522" y="354" font-size="11" fill="#4E8E78" text-anchor="middle">파싱된 심볼 테이블에서 직접 검색</text>
    <line x1="522" y1="392" x2="522" y2="416" stroke="#9CC9B8" stroke-width="2"/>
    <path d="M517,411 L527,411 L522,417 Z" fill="#9CC9B8"/>
    <!-- box2 teal -->
    <rect x="372" y="420" width="300" height="100" rx="9" fill="#DEEFE8" stroke="#B6DCCD" stroke-width="1.2"/>
    <text x="522" y="460" font-size="16" font-weight="700" fill="#2E7D63" text-anchor="middle">파일명 + 줄 번호만 반환</text>
    <text x="522" y="486" font-size="12" fill="#4E8E78" text-anchor="middle">auth/payment.ts:142 (50ms)</text>

    <!-- ===================== RIGHT BLOCK ===================== -->
    <!-- Token comparison card -->
    <rect x="712" y="72" width="536" height="232" rx="14" fill="#F6F3EC" stroke="#E6E1D6" stroke-width="1.2"/>
    <text x="980" y="110" font-size="16" font-weight="700" fill="#3E3E38" text-anchor="middle">토큰 소비 비교 (심볼 탐색 1회 기준)</text>
    <!-- no LSP bar -->
    <text x="740" y="156" font-size="13" fill="#6E6E66">LSP 없음</text>
    <rect x="740" y="166" width="430" height="32" rx="6" fill="#E89384"/>
    <text x="1176" y="188" font-size="12.5" font-weight="700" fill="#B5503F">~8,000 tok</text>
    <!-- LSP bar -->
    <text x="740" y="240" font-size="13" fill="#6E6E66">LSP 있음</text>
    <rect x="740" y="250" width="56" height="32" rx="6" fill="#59B395"/>
    <text x="806" y="272" font-size="12.5" font-weight="700" fill="#2E7D63">~100 tok</text>

    <!-- LSP-only features card -->
    <rect x="712" y="320" width="536" height="332" rx="14" fill="#F6F3EC" stroke="#E6E1D6" stroke-width="1.2"/>
    <text x="980" y="358" font-size="16" font-weight="700" fill="#3E3E38" text-anchor="middle">LSP만 가능한 기능</text>

    <!-- feature 1 -->
    <rect x="732" y="378" width="496" height="74" rx="9" fill="#DEEFE8" stroke="#B6DCCD" stroke-width="1.2"/>
    <text x="980" y="410" font-size="15" font-weight="700" fill="#2E7D63" text-anchor="middle">즉시 진단</text>
    <text x="980" y="433" font-size="12" fill="#4E8E78" text-anchor="middle">편집 후 에러 자동 감지</text>
    <!-- feature 2 -->
    <rect x="732" y="464" width="496" height="74" rx="9" fill="#DEEFE8" stroke="#B6DCCD" stroke-width="1.2"/>
    <text x="980" y="496" font-size="15" font-weight="700" fill="#2E7D63" text-anchor="middle">전체 참조 탐색</text>
    <text x="980" y="519" font-size="12" fill="#4E8E78" text-anchor="middle">findReferences (정확한 위치)</text>
    <!-- feature 3 -->
    <rect x="732" y="550" width="496" height="74" rx="9" fill="#DEEFE8" stroke="#B6DCCD" stroke-width="1.2"/>
    <text x="980" y="582" font-size="15" font-weight="700" fill="#2E7D63" text-anchor="middle">타입 정보 호버</text>
    <text x="980" y="605" font-size="12" fill="#4E8E78" text-anchor="middle">hover → 시그니처 즉시 확인</text>

  </g>
</svg>
