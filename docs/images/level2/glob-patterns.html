<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; }
  body {
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    color: #1A1A18;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    width: 1280px;
    height: 720px;
    position: relative;
    padding: 44px;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 32px;
  }

  table.glob {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    flex: 1;
  }
  table.glob col.c-pat { width: 16%; }
  table.glob col.c-mean { width: 36%; }
  table.glob col.c-ex  { width: 48%; }

  table.glob thead th {
    text-align: left;
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #1A1A18;
    padding: 0 26px 18px 26px;
    vertical-align: bottom;
  }
  table.glob thead tr { border-bottom: 3px solid #0F766E; }

  table.glob tbody td {
    font-size: 24px;
    line-height: 1.45;
    padding: 26px;
    vertical-align: middle;
    border-bottom: 1px solid #D4D0C8;
  }
  table.glob tbody tr:last-child td { border-bottom: none; }

  td.pat {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 28px;
    color: #0F766E;
  }
  td.mean {
    color: #1A1A18;
    font-weight: 500;
    font-size: 24px;
  }
  td.ex {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: #1A1A18;
    white-space: nowrap;
  }
  td.ex .g {
    color: #047857;
    font-weight: 600;
  }
  td.ex .arr {
    color: #6B6560;
    padding: 0 10px;
  }
  td.ex .d {
    color: #B91C1C;
    font-weight: 600;
  }

  .callout {
    flex: none;
    background: #FAF3E6;
    border: 1px solid #B45309;
    border-radius: 10px;
    padding: 26px 34px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .callout .tag {
    flex: none;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 20px;
    color: #7C4A02;
    border: 1px solid #B45309;
    border-radius: 8px;
    padding: 8px 18px;
    letter-spacing: 0.03em;
  }
  .callout .txt {
    font-size: 23px;
    line-height: 1.5;
    color: #7C4A02;
    font-weight: 500;
  }
  .callout .txt b { font-weight: 700; }
  .callout .txt code {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="frame">
    <table class="glob">
      <colgroup>
        <col class="c-pat"><col class="c-mean"><col class="c-ex">
      </colgroup>
      <thead>
        <tr>
          <th>패턴</th>
          <th>설명</th>
          <th>예시</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="pat">*</td>
          <td class="mean">파일명의 모든 문자</td>
          <td class="ex"><span class="g">*.ts</span><span class="arr">&rarr;</span>모든 .ts 파일</td>
        </tr>
        <tr>
          <td class="pat">**</td>
          <td class="mean">모든 디렉터리 (재귀)</td>
          <td class="ex"><span class="g">src/**/*.ts</span><span class="arr">&rarr;</span>src 하위 모든 .ts</td>
        </tr>
        <tr>
          <td class="pat">{a,b}</td>
          <td class="mean">OR 패턴</td>
          <td class="ex"><span class="g">*.{ts,tsx}</span><span class="arr">&rarr;</span>.ts 또는 .tsx</td>
        </tr>
        <tr>
          <td class="pat">!</td>
          <td class="mean">제외</td>
          <td class="ex"><span class="d">!*.test.ts</span><span class="arr">&rarr;</span>테스트 파일 제외</td>
        </tr>
      </tbody>
    </table>

    <div class="callout">
      <span class="tag">권장 분량</span>
      <span class="txt"><b>50~200 라인</b>을 권장한다 &mdash; 길어지면 <code>@import</code>로 분리하거나 <code>.claude/rules/</code>를 활용한다.</span>
    </div>
  </div>
</body>
</html>
