<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 534" font-family="'IBM Plex Sans KR','Pretendard','Noto Sans KR',sans-serif">
  <text x="16" y="30" font-size="19" font-weight="700" fill="#1E293B">MCP가 안 잡힐 때 — 4단계 진단</text>
  <text x="16" y="54" font-size="14" fill="#64748B">위에서 아래로 순차 점검 → 90% 여기서 해결</text>

  <!-- step 1 -->
  <rect x="16" y="72" width="580" height="100" fill="#FFFFFF" stroke="#C5C2BC" stroke-width="1" rx="6"/>
  <text x="34" y="102" font-size="16" font-weight="700" fill="#0F766E">1</text>
  <text x="54" y="102" font-size="16" font-weight="700" fill="#1E293B">파일 위치 확인</text>
  <text x="54" y="126" font-size="13.5" fill="#475569">.mcp.json 은 프로젝트 루트 (.claude/ 안이 아님) · ~/.claude.json 은 홈</text>
  <text x="54" y="152" font-size="13" font-family="'JetBrains Mono',monospace" fill="#0F766E">검증: ls -la ~/.claude.json .mcp.json</text>

  <!-- step 2 -->
  <rect x="16" y="186" width="580" height="100" fill="#FFFFFF" stroke="#C5C2BC" stroke-width="1" rx="6"/>
  <text x="34" y="216" font-size="16" font-weight="700" fill="#0F766E">2</text>
  <text x="54" y="216" font-size="16" font-weight="700" fill="#1E293B">Scope 선택 확인</text>
  <text x="54" y="240" font-size="13.5" fill="#475569">의도한 scope에 저장됐나 · projects.&lt;경로&gt; 키가 정확한가</text>
  <text x="54" y="266" font-size="13" font-family="'JetBrains Mono',monospace" fill="#0F766E">검증: cat ~/.claude.json | jq '.projects | keys'</text>

  <!-- step 3 -->
  <rect x="16" y="300" width="580" height="100" fill="#FFFFFF" stroke="#C5C2BC" stroke-width="1" rx="6"/>
  <text x="34" y="330" font-size="16" font-weight="700" fill="#0F766E">3</text>
  <text x="54" y="330" font-size="16" font-weight="700" fill="#1E293B">환경변수 확인</text>
  <text x="54" y="354" font-size="13.5" fill="#475569">${VAR} 보간은 새 셸에서만 반영 — shell profile에 export 후 재시작</text>
  <text x="54" y="380" font-size="13" font-family="'JetBrains Mono',monospace" fill="#0F766E">검증: echo $GITHUB_TOKEN</text>

  <!-- step 4 -->
  <rect x="16" y="414" width="580" height="100" fill="#FFFFFF" stroke="#C5C2BC" stroke-width="1" rx="6"/>
  <text x="34" y="444" font-size="16" font-weight="700" fill="#0F766E">4</text>
  <text x="54" y="444" font-size="16" font-weight="700" fill="#1E293B">등록 확인</text>
  <text x="54" y="468" font-size="13.5" fill="#475569">/mcp 명령으로 서버 목록 표시 확인 · 안 보이면 1번부터 재점검</text>
  <text x="54" y="494" font-size="13" font-family="'JetBrains Mono',monospace" fill="#0F766E">검증: claude mcp list</text>
</svg>