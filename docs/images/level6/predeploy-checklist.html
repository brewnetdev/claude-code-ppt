<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1A1A18;--warm:#57564f;--line:#e7e5dc;--teal:#003748;--teal-deep:#00212b;--red:#B91C1C;--green:#047857;--cream:#efeee7;--panel:#fff;--sans:'Noto Sans KR','Inter',sans-serif;--mono:'JetBrains Mono',monospace;}
html,body{background:transparent;margin:0}body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
.frame{width:1280px;height:560px;padding:24px 36px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px}
.lede{font-size:23px;color:var(--warm);line-height:1.4}.lede b{color:var(--teal);font-weight:700}.lede .r{color:var(--red);font-weight:700}
.no{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--teal);letter-spacing:.05em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-height:0}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;flex:1;min-height:0}
.flow{display:flex;align-items:stretch;gap:0;flex:1;min-height:0}.arrow{display:flex;align-items:center;justify-content:center;width:52px;color:var(--teal);font-size:36px;font-weight:700;flex-shrink:0}
.card{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:22px 28px;display:flex;flex-direction:column;justify-content:center;gap:12px}
.card h3{margin:0;font-size:30px;font-weight:700;line-height:1.22}.card .en{font-family:var(--mono);font-size:18px;color:var(--warm);font-weight:600}
.card p{margin:0;font-size:21px;color:var(--warm);line-height:1.5}.card .m{font-family:var(--mono);font-size:18px;color:var(--teal-deep)}
.card ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:10px}.card li{font-size:20px;color:var(--warm);line-height:1.4;padding-left:18px;position:relative}.card li:before{content:"";position:absolute;left:0;top:.5em;width:6px;height:6px;background:var(--teal)}
.card .tag{align-self:flex-start;font-family:var(--mono);font-size:17px;font-weight:700;color:var(--teal);border:1px solid var(--teal);border-radius:4px;padding:4px 12px;margin-top:4px}
.card.bad,.card.danger{border-color:var(--red)}.card.bad .no,.card.danger .no,.card.danger h3{color:var(--red)}.card.good{border-color:var(--teal)}
.rows{display:flex;flex-direction:column;gap:12px;margin-top:2px}
.lrow{display:flex;gap:12px;align-items:baseline}.lrow .lb{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--teal);border:1px solid var(--teal);border-radius:4px;padding:2px 10px;white-space:nowrap}.lrow .vv{font-size:20px;color:var(--ink);line-height:1.4}
.note{border:1px solid var(--line);background:var(--cream);border-radius:8px;padding:18px 26px;display:flex;align-items:flex-start;gap:16px}
.note .k{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--teal);letter-spacing:.04em;white-space:nowrap;padding-top:3px}.note .b{font-size:21px;color:var(--ink);line-height:1.45}.note .b b{color:var(--teal-deep)}.note .b .m{font-family:var(--mono);font-size:18px;color:var(--teal-deep)}
.check{display:flex;flex-direction:column;gap:12px;flex:1;min-height:0;justify-content:center}
.crow{display:flex;align-items:center;gap:16px;border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:15px 22px}
.crow .ck{width:28px;height:28px;border:2px solid var(--teal);border-radius:6px;color:var(--teal);font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.crow .t{font-size:22px;color:var(--ink)}.crow .cmd{margin-left:auto;font-family:var(--mono);font-size:18px;color:var(--teal-deep);background:var(--cream);border:1px solid var(--line);border-radius:4px;padding:4px 12px;white-space:nowrap}
</style></head><body><div class="frame">
<div class="lede">배포 전 <b>로컬에서 빌드가 정상</b>인지 반드시 확인 — Vercel 빌드 에러는 디버깅이 번거롭다.</div>
<div class="check">
 <div class="crow"><div class="ck">&#10003;</div><div class="t">GitHub 리포지터리 생성 및 main 브랜치 푸시</div></div>
 <div class="crow"><div class="ck">&#10003;</div><div class="t">로컬 프로덕션 빌드 성공</div><div class="cmd">npm run build</div></div>
 <div class="crow"><div class="ck">&#10003;</div><div class="t">TypeScript 타입 체크 통과</div><div class="cmd">npx tsc --noEmit</div></div>
 <div class="crow"><div class="ck">&#10003;</div><div class="t">.env.local → .env.example 동기화 (시크릿 제외)</div></div>
 <div class="crow"><div class="ck">&#10003;</div><div class="t">DB 마이그레이션 스크립트 준비</div><div class="cmd">npm run db:migrate</div></div>
 <div class="crow"><div class="ck">&#10003;</div><div class="t">DB 호출 페이지에 dynamic 설정</div><div class="cmd">dynamic = 'force-dynamic'</div></div>
</div></div></body></html>
