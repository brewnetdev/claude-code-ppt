<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A1-IMG-2 · stdout/stderr 파이프·리다이렉션 흐름</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_theme.css">
</head>
<body>
<div class="frame">
  <h1 class="title">출력은 어디로 가나 — stdout / stderr</h1>
  <p class="subtitle">파이프(<span class="mono">|</span>)·리다이렉션(<span class="mono">&gt; &gt;&gt; 2&gt;&amp;1</span>)에 따라 흐름이 갈린다</p>
  <svg class="svgwrap" viewBox="0 0 1152 540" style="height:498px" xmlns="http://www.w3.org/2000/svg"
       font-family="'Pretendard','Noto Sans KR',sans-serif">
    <defs>
      <marker id="a" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#D8D2C8"/>
      </marker>
      <marker id="at" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#1A7F7A"/>
      </marker>
    </defs>

    <!-- Command box (left) -->
    <rect x="8" y="180" width="230" height="92" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="123" y="214" text-anchor="middle" font-size="16" fill="#2B2B2B">명령 실행</text>
    <text x="123" y="242" text-anchor="middle" font-size="15" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">npm run dev</text>

    <!-- stdout arrow (upper) -->
    <polyline points="238,200 318,200 318,96 392,96" fill="none" stroke="#D8D2C8" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="328" y="186" text-anchor="middle" font-size="13" fill="#6E6A62">stdout (정상)</text>

    <!-- stderr arrow (lower) -->
    <polyline points="238,252 290,252 290,420 392,420" fill="none" stroke="#D8D2C8" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="300" y="276" text-anchor="middle" font-size="13" fill="#6E6A62">stderr (에러)</text>

    <!-- Symbol boxes (center column) -->
    <!-- | pipe -->
    <rect x="394" y="68" width="210" height="56" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="416" y="102" font-size="16" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">|</text>
    <text x="446" y="102" font-size="15" fill="#2B2B2B">파이프</text>

    <!-- > overwrite -->
    <rect x="394" y="136" width="210" height="56" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="416" y="170" font-size="16" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">&gt;</text>
    <text x="446" y="170" font-size="15" fill="#2B2B2B">덮어쓰기</text>

    <!-- >> append -->
    <rect x="394" y="204" width="210" height="56" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="416" y="238" font-size="16" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">&gt;&gt;</text>
    <text x="452" y="238" font-size="15" fill="#2B2B2B">이어쓰기</text>

    <!-- 2>&1 merge (teal accent) -->
    <rect x="394" y="384" width="210" height="72" rx="6" fill="#F4F1EC" stroke="#1A7F7A" stroke-width="1.5"/>
    <text x="416" y="416" font-size="16" fill="#1A7F7A" font-family="'JetBrains Mono',monospace">2&gt;&amp;1</text>
    <text x="466" y="416" font-size="15" fill="#1A7F7A">에러 합류</text>
    <text x="499" y="440" text-anchor="middle" font-size="12.5" fill="#6E6A62">stderr → stdout</text>

    <!-- 2>&1 merge visual: stderr line curving up toward stdout -->
    <polyline points="392,400 358,400 358,300 392,300" fill="none" stroke="#1A7F7A" stroke-width="1.5" marker-end="url(#at)"/>

    <!-- Symbol boxes -> destinations -->
    <!-- pipe -> 다음 명령 -->
    <polyline points="604,96 720,96 720,96 820,96" fill="none" stroke="#D8D2C8" stroke-width="1.5" marker-end="url(#a)"/>
    <!-- > and >> -> 파일(.log) -->
    <polyline points="604,164 700,164 700,260 820,260" fill="none" stroke="#D8D2C8" stroke-width="1.5" marker-end="url(#a)"/>
    <polyline points="604,232 680,232 680,260 820,260" fill="none" stroke="#D8D2C8" stroke-width="1.5"/>
    <!-- 2>&1 (teal) -> joins toward 파일/클립보드 -->
    <polyline points="604,420 730,420 730,408 820,408" fill="none" stroke="#1A7F7A" stroke-width="1.5" marker-end="url(#at)"/>

    <!-- Destination boxes (right) -->
    <rect x="822" y="64" width="222" height="62" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="933" y="101" text-anchor="middle" font-size="16" fill="#2B2B2B">다음 명령</text>

    <rect x="822" y="228" width="222" height="62" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="850" y="266" font-size="15" fill="#2B2B2B">파일</text>
    <text x="890" y="266" font-size="15" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">(.log)</text>

    <rect x="822" y="376" width="222" height="62" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="850" y="414" font-size="15" fill="#2B2B2B">클립보드</text>
    <text x="916" y="414" font-size="15" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">pbcopy</text>

    <!-- caption -->
    <text x="576" y="514" text-anchor="middle" font-size="16" fill="#2B2B2B">
      <tspan font-family="'JetBrains Mono',monospace" fill="#1A7F7A" font-weight="600">2&gt;&amp;1</tspan>
      <tspan dx="6"> = 에러도 같은 로그로 → 클로드에 완전한 로그 전달</tspan>
    </text>
  </svg>
</div>
</body>
</html>
