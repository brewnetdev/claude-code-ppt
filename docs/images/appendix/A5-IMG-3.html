<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A5-IMG-3 · Fable 5 요청 처리 흐름</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_theme.css">
</head>
<body>
<div class="frame">
  <h1 class="title center">Fable 5 요청 처리 흐름</h1>
  <svg class="svgwrap" viewBox="0 0 1152 446" style="display:block;width:100%;height:446px"
       xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Noto Sans KR',sans-serif">
    <defs>
      <marker id="aT" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#1A7F7A"/>
      </marker>
      <marker id="aN" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#6E6A62"/>
      </marker>
    </defs>

    <!-- Box1 사용자 요청 -->
    <rect x="6" y="180" width="170" height="72" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="91" y="222" text-anchor="middle" font-size="17" fill="#2B2B2B">사용자 요청</text>

    <!-- arrow1 -->
    <line x1="176" y1="216" x2="229" y2="216" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#aN)"/>

    <!-- Box2 분류기 -->
    <rect x="235" y="170" width="262" height="92" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="366" y="206" text-anchor="middle" font-size="16" fill="#2B2B2B">Fable 5 분류기 (3종 검사)</text>
    <text x="366" y="232" text-anchor="middle" font-size="12.5" fill="#6E6A62" font-family="'JetBrains Mono',monospace">사이버 · 생물·화학 · distillation</text>

    <!-- arrow2 -->
    <line x1="497" y1="216" x2="523" y2="216" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#aN)"/>

    <!-- Diamond 민감 주제? (accent) -->
    <polygon points="624,160 719,216 624,272 529,216" fill="#F4F1EC" stroke="#1A7F7A" stroke-width="1.5"/>
    <text x="624" y="222" text-anchor="middle" font-size="16" fill="#2B2B2B">민감 주제?</text>

    <!-- YES path (teal) up to 폴백 box -->
    <polyline points="624,160 624,128 824,128" fill="none" stroke="#1A7F7A" stroke-width="1.5" marker-end="url(#aT)"/>
    <text x="690" y="118" text-anchor="middle" font-size="14" fill="#1A7F7A" font-weight="700" font-family="'JetBrains Mono',monospace">YES</text>

    <!-- NO path (neutral) down to 직접 응답 box -->
    <polyline points="624,272 624,342 824,342" fill="none" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#aN)"/>
    <text x="690" y="332" text-anchor="middle" font-size="14" fill="#6E6A62" font-weight="700" font-family="'JetBrains Mono',monospace">NO</text>

    <!-- Box YES 거부 → Opus 4.8 폴백 (accent) -->
    <rect x="830" y="92" width="300" height="76" rx="6" fill="#F4F1EC" stroke="#1A7F7A" stroke-width="1.5"/>
    <text x="980" y="136" text-anchor="middle" font-size="16" fill="#2B2B2B">거부 → <tspan font-family="'JetBrains Mono',monospace">Opus 4.8</tspan> 폴백</text>

    <!-- Box NO Fable 5 직접 응답 -->
    <rect x="830" y="304" width="300" height="76" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="980" y="348" text-anchor="middle" font-size="16" fill="#2B2B2B"><tspan font-family="'JetBrains Mono',monospace">Fable 5</tspan> 직접 응답</text>
  </svg>
  <div class="note" style="text-align:center;margin-top:14px"><span class="mono">95%+</span> 세션: 폴백 미발동 · 폴백 시 <span class="mono">prompt-cache</span> 비용 환불</div>
</div>
</body>
</html>
