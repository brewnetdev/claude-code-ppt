<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A3-IMG-3 · 계획→실행→병렬→모니터 + Teleport</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_theme.css">
</head>
<body>
<div class="frame">
  <h1 class="title">계획 → 실행 → 병렬 → 모니터</h1>
  <p class="subtitle">단계마다 코드가 도는 위치가 다르다 · Teleport로 로컬에 당겨와 재푸시</p>
  <svg class="svgwrap" viewBox="0 0 1152 540" style="height:520px" xmlns="http://www.w3.org/2000/svg"
       font-family="'Pretendard','Noto Sans KR',sans-serif">
    <defs>
      <marker id="a" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#2B2B2B"/>
      </marker>
      <marker id="a-teal" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#1A7F7A"/>
      </marker>
    </defs>

    <!-- ====== Stage 1: 계획 (Plan) — 로컬 ====== -->
    <rect x="14" y="40" width="252" height="150" rx="8" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="140" y="82" text-anchor="middle" font-size="20" font-weight="700" fill="#2B2B2B">계획 (Plan)</text>
    <line x1="42" y1="104" x2="238" y2="104" stroke="#D8D2C8" stroke-width="1"/>
    <text x="140" y="158" text-anchor="middle" font-size="13" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">claude --permission-</text>
    <text x="140" y="178" text-anchor="middle" font-size="13" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">mode plan</text>
    <!-- band -->
    <rect x="14" y="200" width="252" height="38" rx="6" fill="#F0EDE8" stroke="#D8D2C8" stroke-width="1"/>
    <text x="140" y="225" text-anchor="middle" font-size="16" fill="#2B2B2B">로컬</text>

    <!-- arrow 1->2 -->
    <line x1="270" y1="115" x2="294" y2="115" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#a)"/>

    <!-- ====== Stage 2: 실행 (Execute) — 클라우드 ====== -->
    <rect x="298" y="40" width="252" height="150" rx="8" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="424" y="82" text-anchor="middle" font-size="20" font-weight="700" fill="#2B2B2B">실행 (Execute)</text>
    <line x1="326" y1="104" x2="522" y2="104" stroke="#D8D2C8" stroke-width="1"/>
    <text x="424" y="168" text-anchor="middle" font-size="14" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">claude --remote "..."</text>
    <rect x="298" y="200" width="252" height="38" rx="6" fill="#F0EDE8" stroke="#D8D2C8" stroke-width="1"/>
    <text x="424" y="225" text-anchor="middle" font-size="16" fill="#1A7F7A" font-weight="700">클라우드</text>

    <!-- arrow 2->3 -->
    <line x1="554" y1="115" x2="578" y2="115" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#a)"/>

    <!-- ====== Stage 3: 병렬 (Parallel) — 클라우드 × N ====== -->
    <rect x="582" y="40" width="252" height="150" rx="8" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="708" y="82" text-anchor="middle" font-size="20" font-weight="700" fill="#2B2B2B">병렬 (Parallel)</text>
    <line x1="610" y1="104" x2="806" y2="104" stroke="#D8D2C8" stroke-width="1"/>
    <text x="708" y="168" text-anchor="middle" font-size="14" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">claude --remote × 3</text>
    <rect x="582" y="200" width="252" height="38" rx="6" fill="#F0EDE8" stroke="#D8D2C8" stroke-width="1"/>
    <text x="708" y="225" text-anchor="middle" font-size="16" fill="#1A7F7A" font-weight="700">클라우드 × N</text>

    <!-- arrow 3->4 -->
    <line x1="838" y1="115" x2="862" y2="115" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#a)"/>

    <!-- ====== Stage 4: 모니터 (Monitor) — 웹·모바일 ====== -->
    <rect x="866" y="40" width="252" height="150" rx="8" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="992" y="82" text-anchor="middle" font-size="20" font-weight="700" fill="#2B2B2B">모니터 (Monitor)</text>
    <line x1="894" y1="104" x2="1090" y2="104" stroke="#D8D2C8" stroke-width="1"/>
    <text x="992" y="168" text-anchor="middle" font-size="14" fill="#2B2B2B" font-family="'JetBrains Mono',monospace">/tasks · /mobile</text>
    <rect x="866" y="200" width="252" height="38" rx="6" fill="#F0EDE8" stroke="#D8D2C8" stroke-width="1"/>
    <text x="992" y="225" text-anchor="middle" font-size="16" fill="#2B2B2B">웹·모바일</text>

    <!-- ====== Teleport dashed branch: stage 4 -> stage 1/2 ====== -->
    <!-- down from stage 4 band, across, up to between stage 1 and 2 -->
    <polyline points="992,238 992,330 140,330 140,242"
              fill="none" stroke="#1A7F7A" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#a-teal)"/>
    <polyline points="424,330 424,242"
              fill="none" stroke="#1A7F7A" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#a-teal)"/>
    <text x="566" y="318" text-anchor="middle" font-size="16" fill="#1A7F7A" font-weight="700">Teleport — 로컬로 당겨와 수정 후 재푸시</text>

    <!-- legend -->
    <text x="14" y="372" font-size="14" fill="#6E6A62">실선 — 단계 진행 · 점선(teal) — Teleport로 로컬 회귀 · teal 띠 — 클라우드 실행 위치</text>
  </svg>
</div>
</body>
</html>
