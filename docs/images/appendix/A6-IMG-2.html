<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A6-IMG-2 · 자율 수렴 루프</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_theme.css">
</head>
<body>
<div class="frame">
  <h1 class="title">자율 수렴 루프 — 통과까지 스스로 반복</h1>

  <svg class="svgwrap" viewBox="0 0 1152 556" style="height:556px" xmlns="http://www.w3.org/2000/svg"
       font-family="'Pretendard','Noto Sans KR',sans-serif">
    <defs>
      <marker id="ai" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#2B2B2B"/>
      </marker>
      <marker id="at" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#1A7F7A"/>
      </marker>
    </defs>

    <!-- entry box: 목표 제시 -->
    <rect x="40" y="110" width="270" height="66" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="175" y="142" text-anchor="middle" font-size="16" fill="#2B2B2B" font-weight="600">목표 제시</text>
    <text x="175" y="163" text-anchor="middle" font-size="12" fill="#6E6A62">(검증 기준 포함)</text>

    <!-- loop boxes -->
    <rect x="590" y="120" width="150" height="56" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="665" y="153" text-anchor="middle" font-size="17" fill="#2B2B2B">실행</text>

    <rect x="835" y="270" width="150" height="56" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="910" y="303" text-anchor="middle" font-size="17" fill="#2B2B2B">진단</text>

    <rect x="590" y="420" width="150" height="56" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="665" y="453" text-anchor="middle" font-size="17" fill="#2B2B2B">수정</text>

    <rect x="345" y="270" width="150" height="56" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="420" y="303" text-anchor="middle" font-size="17" fill="#2B2B2B">재실행</text>

    <!-- entry arrow 목표 제시 -> 실행 -->
    <line x1="310" y1="148" x2="588" y2="148" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#ai)"/>
    <text x="450" y="138" text-anchor="middle" font-size="12" fill="#6E6A62">최초 1회</text>

    <!-- clockwise loop arrows (ink) -->
    <polyline points="740,148 910,148 910,268" fill="none" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#ai)"/>
    <polyline points="910,326 910,448 742,448" fill="none" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#ai)"/>
    <polyline points="590,448 420,448 420,328" fill="none" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#ai)"/>

    <!-- fail branch: 재실행 -> 진단 -->
    <line x1="497" y1="298" x2="833" y2="298" stroke="#2B2B2B" stroke-width="1.5" marker-end="url(#ai)"/>
    <text x="665" y="288" text-anchor="middle" font-size="13" fill="#2B2B2B">실패 → 반복</text>

    <!-- pass branch: 재실행 -> GREEN (teal) -->
    <polyline points="345,298 312,298 312,485" fill="none" stroke="#1A7F7A" stroke-width="1.5" marker-end="url(#at)"/>
    <text x="368" y="408" text-anchor="start" font-size="13" fill="#1A7F7A" font-weight="600">통과 → 종료</text>

    <!-- GREEN exit box (teal) -->
    <rect x="300" y="487" width="340" height="56" rx="6" fill="#F4F1EC" stroke="#1A7F7A" stroke-width="1.5"/>
    <text x="470" y="521" text-anchor="middle" font-size="16" fill="#2B2B2B">
      <tspan font-family="'JetBrains Mono',monospace" fill="#1A7F7A" font-weight="700">GREEN</tspan> : 모든 테스트 통과</text>
  </svg>
</div>
</body>
</html>
