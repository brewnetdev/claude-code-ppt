<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A5-IMG-5 · Fable 5 vs Opus 4.8 선택 기준</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_theme.css">
</head>
<body>
<div class="frame" style="display:flex;flex-direction:column;justify-content:center;padding:64px 96px">
  <h1 class="title center">Fable 5 vs Opus 4.8 — 선택 기준</h1>
  <p class="subtitle center">성능 · 가격 · 추천 용도 3축 비교</p>
  <div style="max-width:1000px;margin:0 auto;width:100%">
    <table class="cmp" style="font-size:19px">
      <thead>
        <tr>
          <th class="k" style="color:var(--ink);border-bottom:2px solid var(--line)"></th>
          <th class="mono teal" style="width:380px;border-bottom:2px solid var(--line)">Fable 5</th>
          <th class="mono" style="width:380px;color:var(--ink);border-bottom:2px solid var(--line)">Opus 4.8</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="k">성능</td>
          <td class="teal bold">SOTA (최고)</td>
          <td>높음</td>
        </tr>
        <tr>
          <td class="k">가격 <span style="font-weight:400;font-size:14px">(입/출, 100만 토큰)</span></td>
          <td class="mono">$10 / $50</td>
          <td class="mono">$5 / $25</td>
        </tr>
        <tr>
          <td class="k">추천 용도</td>
          <td>대형 리팩토링 · 장기 추론 · 멀티턴 · 비전</td>
          <td>간단한 작업 · 빠른 응답 · 비용 절감</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
