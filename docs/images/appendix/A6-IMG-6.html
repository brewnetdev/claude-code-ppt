<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A6-IMG-6 · Deny/Ask/Allow 결정 트리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_theme.css">
</head>
<body>
<div class="frame">
  <h1 class="title">도구 호출 권한 결정 트리 — Deny → Ask → Allow</h1>
  <svg class="svgwrap" viewBox="0 0 1152 574" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg"
       font-family="'Pretendard','Noto Sans KR',sans-serif">
    <defs>
      <marker id="n6" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 Z" fill="#6E6A62"/>
      </marker>
    </defs>

    <!-- top caption (teal) -->
    <text x="576" y="26" text-anchor="middle" font-size="18" font-weight="700" fill="#1A7F7A">Hook이 deny보다 우선</text>

    <!-- entry: 도구 호출 -->
    <rect x="70" y="50" width="340" height="46" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="240" y="79" text-anchor="middle" font-size="16" fill="#2B2B2B">도구 호출</text>
    <line x1="240" y1="96" x2="240" y2="120" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>

    <!-- D1 PreToolUse -->
    <rect x="70" y="122" width="340" height="58" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="240" y="156" text-anchor="middle" font-size="16" fill="#2B2B2B"><tspan font-family="'JetBrains Mono',monospace">PreToolUse</tspan> 훅 <tspan font-family="'JetBrains Mono',monospace">exit 2</tspan> ?</text>
    <!-- D1 -> T1 (yes) -->
    <line x1="410" y1="151" x2="718" y2="151" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="560" y="143" text-anchor="middle" font-size="13" fill="#6E6A62">예</text>
    <!-- D1 -> D2 (no) -->
    <line x1="240" y1="180" x2="240" y2="210" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="258" y="199" text-anchor="start" font-size="13" fill="#6E6A62">아니오</text>

    <!-- D2 Deny -->
    <rect x="70" y="212" width="340" height="58" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="240" y="246" text-anchor="middle" font-size="16" fill="#2B2B2B"><tspan font-family="'JetBrains Mono',monospace">Deny</tspan> 매칭 ?</text>
    <line x1="410" y1="241" x2="718" y2="241" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="560" y="233" text-anchor="middle" font-size="13" fill="#6E6A62">예</text>
    <line x1="240" y1="270" x2="240" y2="300" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="258" y="289" text-anchor="start" font-size="13" fill="#6E6A62">아니오</text>

    <!-- D3 Ask -->
    <rect x="70" y="302" width="340" height="58" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="240" y="336" text-anchor="middle" font-size="16" fill="#2B2B2B"><tspan font-family="'JetBrains Mono',monospace">Ask</tspan> 매칭 ?</text>
    <line x1="410" y1="331" x2="718" y2="331" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="560" y="323" text-anchor="middle" font-size="13" fill="#6E6A62">예</text>
    <line x1="240" y1="360" x2="240" y2="390" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="258" y="379" text-anchor="start" font-size="13" fill="#6E6A62">아니오</text>

    <!-- D4 Allow -->
    <rect x="70" y="392" width="340" height="58" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="240" y="426" text-anchor="middle" font-size="16" fill="#2B2B2B"><tspan font-family="'JetBrains Mono',monospace">Allow</tspan> 매칭 ?</text>
    <line x1="410" y1="421" x2="718" y2="421" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="560" y="413" text-anchor="middle" font-size="13" fill="#6E6A62">예</text>
    <line x1="240" y1="450" x2="240" y2="480" stroke="#6E6A62" stroke-width="1.5" marker-end="url(#n6)"/>
    <text x="258" y="469" text-anchor="start" font-size="13" fill="#6E6A62">아니오</text>

    <!-- final default -->
    <rect x="70" y="482" width="340" height="52" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="240" y="514" text-anchor="middle" font-size="16" fill="#2B2B2B">기본: 확인</text>

    <!-- ===== terminal nodes (right) ===== -->
    <!-- T1 차단 (teal) -->
    <rect x="720" y="122" width="320" height="54" rx="6" fill="#F4F1EC" stroke="#1A7F7A" stroke-width="1.5"/>
    <text x="880" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#1A7F7A">차단 <tspan font-family="'JetBrains Mono',monospace" font-weight="400">(blocked)</tspan></text>
    <!-- T2 차단 (teal) -->
    <rect x="720" y="212" width="320" height="54" rx="6" fill="#F4F1EC" stroke="#1A7F7A" stroke-width="1.5"/>
    <text x="880" y="245" text-anchor="middle" font-size="16" font-weight="700" fill="#1A7F7A">차단 <tspan font-family="'JetBrains Mono',monospace" font-weight="400">(blocked)</tspan></text>
    <!-- T3 사용자 확인 -->
    <rect x="720" y="302" width="320" height="54" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="880" y="335" text-anchor="middle" font-size="16" fill="#2B2B2B">사용자 확인 <tspan font-family="'JetBrains Mono',monospace">(ask)</tspan></text>
    <!-- T4 자동 승인 -->
    <rect x="720" y="392" width="320" height="54" rx="6" fill="#F4F1EC" stroke="#D8D2C8" stroke-width="1.5"/>
    <text x="880" y="425" text-anchor="middle" font-size="16" fill="#2B2B2B">자동 승인 <tspan font-family="'JetBrains Mono',monospace">(allow)</tspan></text>
  </svg>
</div>
</body>
</html>
