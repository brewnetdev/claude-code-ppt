<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A4-IMG-3 · 상황 → 명령 결정표</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_theme.css">
</head>
<body>
<div class="frame">
  <h1 class="title">상황 → 쓸 명령 — 빠른 결정표</h1>
  <p class="subtitle">작업 상황별로 어떤 명령을 고를지 한눈에</p>
  <table class="cmp">
    <thead>
      <tr>
        <th style="width:46%; color:var(--ink); padding:26px 16px">상황</th>
        <th style="color:var(--ink)">쓸 명령</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="k" style="padding:26px 16px">빠른 폴링 (1~10분)</td>
        <td class="mono teal">/loop 5m ...</td>
      </tr>
      <tr>
        <td class="k" style="padding:26px 16px">느린 폴링 (30~60분)</td>
        <td class="mono teal">/loop 30m ...</td>
      </tr>
      <tr>
        <td class="k" style="padding:26px 16px">동적 폴링</td>
        <td class="mono teal">/loop ...</td>
      </tr>
      <tr>
        <td class="k" style="padding:26px 16px">될 때까지 고치기</td>
        <td class="mono teal">/goal all tests pass</td>
      </tr>
      <tr>
        <td class="k" style="padding:26px 16px">상시 자동화 (머신 꺼져도)</td>
        <td class="mono teal">/schedule</td>
      </tr>
      <tr>
        <td class="k" style="padding:26px 16px">PR 베이비싯</td>
        <td class="mono teal">/loop 15m</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
