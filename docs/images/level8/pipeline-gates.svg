<svg width="100%" viewBox="0 0 1280 590" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans KR, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <polygon points="0,0 9,5 0,10" fill="#0F766E"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <polygon points="0,0 9,5 0,10" fill="#B91C1C"/>
    </marker>
  </defs>

  <!-- Horizontal pipeline: research -> plan -> execute -> review -> ship. 5 stages, w=228 each, gap 12. -->

  <!-- stage 1: research -->
  <g>
    <rect x="20" y="70" width="228" height="330" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
    <text x="134" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0F766E" font-family="JetBrains Mono, monospace">research</text>
    <line x1="40" y1="124" x2="228" y2="124" stroke="#D4D0C8" stroke-width="1"/>
    <text x="40" y="152" font-size="15" font-weight="700" fill="#1A1A18">산출물</text>
    <text x="40" y="176" font-size="15" fill="#6B6560">조사 요약</text>
    <text x="40" y="196" font-size="15" fill="#6B6560">(한 문단~한 페이지)</text>
    <text x="40" y="238" font-size="15" font-weight="700" fill="#1A1A18">게이트</text>
    <text x="40" y="262" font-size="15" fill="#6B6560">메인 컨텍스트가</text>
    <text x="40" y="282" font-size="15" fill="#6B6560">원자료로 오염되지</text>
    <text x="40" y="302" font-size="15" fill="#6B6560">않았는가</text>
    <rect x="40" y="332" width="188" height="48" fill="#FAF3E6" stroke="#D4D0C8" stroke-width="1" rx="4"/>
    <text x="52" y="352" font-size="14" font-weight="700" fill="#1A1A18">동원 부품</text>
    <text x="52" y="372" font-size="14" fill="#0F766E">서브에이전트 (LV5)</text>
  </g>

  <!-- stage 2: plan -->
  <g>
    <rect x="270" y="70" width="228" height="330" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
    <text x="384" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0F766E" font-family="JetBrains Mono, monospace">plan</text>
    <line x1="290" y1="124" x2="478" y2="124" stroke="#D4D0C8" stroke-width="1"/>
    <text x="290" y="152" font-size="15" font-weight="700" fill="#1A1A18">산출물</text>
    <text x="290" y="176" font-size="15" fill="#6B6560">PLAN.md — 요구사항</text>
    <text x="290" y="196" font-size="15" fill="#6B6560">· 엣지 케이스 · 범위</text>
    <text x="290" y="238" font-size="15" font-weight="700" fill="#1A1A18">게이트</text>
    <text x="290" y="262" font-size="15" fill="#6B6560">사람 승인. 계획이</text>
    <text x="290" y="282" font-size="15" fill="#6B6560">검증 가능한</text>
    <text x="290" y="302" font-size="15" fill="#6B6560">문장인가</text>
    <rect x="290" y="332" width="188" height="48" fill="#FAF3E6" stroke="#D4D0C8" stroke-width="1" rx="4"/>
    <text x="302" y="352" font-size="14" font-weight="700" fill="#1A1A18">동원 부품</text>
    <text x="302" y="372" font-size="14" fill="#0F766E">플랜 모드 (LV2)</text>
  </g>

  <!-- stage 3: execute -->
  <g>
    <rect x="520" y="70" width="228" height="330" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
    <text x="634" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0F766E" font-family="JetBrains Mono, monospace">execute</text>
    <line x1="540" y1="124" x2="728" y2="124" stroke="#D4D0C8" stroke-width="1"/>
    <text x="540" y="152" font-size="15" font-weight="700" fill="#1A1A18">산출물</text>
    <text x="540" y="176" font-size="15" fill="#6B6560">diff + 통과하는</text>
    <text x="540" y="196" font-size="15" fill="#6B6560">테스트</text>
    <text x="540" y="238" font-size="15" font-weight="700" fill="#1A1A18">게이트</text>
    <text x="540" y="262" font-size="15" fill="#6B6560">훅 전부 녹색</text>
    <text x="540" y="282" font-size="15" fill="#6B6560">(포맷 · 빠른 테스트</text>
    <text x="540" y="302" font-size="15" fill="#6B6560">· 차단기)</text>
    <rect x="540" y="332" width="188" height="48" fill="#FAF3E6" stroke="#D4D0C8" stroke-width="1" rx="4"/>
    <text x="552" y="352" font-size="14" font-weight="700" fill="#1A1A18">동원 부품</text>
    <text x="552" y="372" font-size="14" fill="#0F766E">훅 (LV4) · 커맨드 (LV3)</text>
  </g>

  <!-- stage 4: review -->
  <g>
    <rect x="770" y="70" width="228" height="330" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
    <text x="884" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0F766E" font-family="JetBrains Mono, monospace">review</text>
    <line x1="790" y1="124" x2="978" y2="124" stroke="#D4D0C8" stroke-width="1"/>
    <text x="790" y="152" font-size="15" font-weight="700" fill="#1A1A18">산출물</text>
    <text x="790" y="176" font-size="15" fill="#6B6560">갭 목록</text>
    <text x="790" y="196" font-size="15" fill="#6B6560">(또는 "갭 없음")</text>
    <text x="790" y="238" font-size="15" font-weight="700" fill="#1A1A18">게이트</text>
    <text x="790" y="262" font-size="15" fill="#6B6560">정확성 갭 0건.</text>
    <text x="790" y="282" font-size="15" fill="#6B6560">취향 지적은</text>
    <text x="790" y="302" font-size="15" fill="#6B6560">게이트 아님</text>
    <rect x="790" y="332" width="188" height="48" fill="#FAF3E6" stroke="#D4D0C8" stroke-width="1" rx="4"/>
    <text x="802" y="352" font-size="14" font-weight="700" fill="#1A1A18">동원 부품</text>
    <text x="802" y="372" font-size="14" fill="#0F766E">검증 서브에이전트 (LV5)</text>
  </g>

  <!-- stage 5: ship -->
  <g>
    <rect x="1020" y="70" width="240" height="330" fill="#FAF3E6" stroke="#0F766E" stroke-width="1.5" rx="6"/>
    <text x="1140" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0F766E" font-family="JetBrains Mono, monospace">ship</text>
    <line x1="1040" y1="124" x2="1240" y2="124" stroke="#D4D0C8" stroke-width="1"/>
    <text x="1040" y="152" font-size="15" font-weight="700" fill="#1A1A18">산출물</text>
    <text x="1040" y="176" font-size="15" fill="#6B6560">증거 묶음 (테스트</text>
    <text x="1040" y="196" font-size="15" fill="#6B6560">출력 · 명령 반환값)</text>
    <text x="1040" y="238" font-size="15" font-weight="700" fill="#1A1A18">게이트</text>
    <text x="1040" y="262" font-size="15" fill="#6B6560">사람이 증거 확인.</text>
    <text x="1040" y="282" font-size="15" fill="#6B6560">단언만으로는</text>
    <text x="1040" y="302" font-size="15" fill="#6B6560">통과 불가</text>
    <rect x="1040" y="332" width="200" height="48" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="4"/>
    <text x="1052" y="352" font-size="14" font-weight="700" fill="#1A1A18">동원 부품</text>
    <text x="1052" y="372" font-size="14" fill="#0F766E">증거 원칙 (LV5) · ask 권한 (LV2)</text>
  </g>

  <!-- forward arrows between stages -->
  <line x1="248" y1="235" x2="270" y2="235" stroke="#0F766E" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="498" y1="235" x2="520" y2="235" stroke="#0F766E" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="748" y1="235" x2="770" y2="235" stroke="#0F766E" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="998" y1="235" x2="1020" y2="235" stroke="#0F766E" stroke-width="2" marker-end="url(#ar)"/>

  <!-- return loop: review -> execute (갭 발견 시 되돌림) -->
  <path d="M 790 420 L 634 420 L 634 400" fill="none" stroke="#B91C1C" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arR)"/>
  <path d="M 884 400 L 884 420" fill="none" stroke="#B91C1C" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="760" y="440" text-anchor="middle" font-size="15" fill="#B91C1C" font-weight="700">갭 발견 시 execute로 되돌림</text>

  <!-- Band -->
  <rect x="20" y="500" width="1240" height="70" fill="#FAF3E6" stroke="#D4D0C8" stroke-width="1" rx="4"/>
  <text x="44" y="530" font-size="18" font-weight="700" fill="#0F766E">완성형의 정의 — 5단계가 존재하고, 각 전환이 게이트이며, 게이트마다 통과 조건이 명시된 상태.</text>
  <text x="44" y="556" font-size="16" fill="#1A1A18">"대충 봤고 괜찮아 보임"은 게이트가 아니다. 각 단계는 셋업을 지불하고 주의(attention)를 되사는 거래 — 감독이 게이트 순간의 확인으로 압축된다.</text>
</svg>
