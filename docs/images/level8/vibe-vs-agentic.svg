<svg width="100%" viewBox="0 0 1280 590" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans KR, sans-serif">
  <!-- two column headers -->
  <rect x="360" y="52" width="440" height="42" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="580" y="80" text-anchor="middle" font-size="19" font-weight="700" fill="#B91C1C">바이브 코딩</text>
  <rect x="812" y="52" width="448" height="42" fill="#FAF3E6" stroke="#0F766E" stroke-width="1.5" rx="6"/>
  <text x="1036" y="80" text-anchor="middle" font-size="19" font-weight="700" fill="#0F766E">에이전틱 엔지니어링</text>

  <!-- Row 1: 방식 -->
  <rect x="20" y="104" width="330" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="40" y="160" font-size="18" font-weight="700" fill="#1A1A18">방식</text>
  <rect x="360" y="104" width="440" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="380" y="140" font-size="16" fill="#1A1A18">계획 · 리뷰 · 테스트 없는</text>
  <text x="380" y="164" font-size="16" fill="#1A1A18">원샷 프롬프팅</text>
  <text x="380" y="190" font-size="15" fill="#6B6560">"설명하고 배포"</text>
  <rect x="812" y="104" width="448" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="832" y="140" font-size="16" fill="#1A1A18">5단계 루프 오케스트레이션</text>
  <text x="832" y="166" font-size="16" fill="#1A1A18">사람은 <tspan font-weight="700" fill="#0F766E">각 게이트의 감독자</tspan></text>

  <!-- Row 2: 통하는 곳 -->
  <rect x="20" y="212" width="330" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="40" y="268" font-size="18" font-weight="700" fill="#1A1A18">통하는 곳</text>
  <rect x="360" y="212" width="440" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="380" y="248" font-size="16" fill="#1A1A18">프로토타입까지</text>
  <text x="380" y="278" font-size="15" fill="#6B6560">"헛간까지는 서지만</text>
  <text x="380" y="298" font-size="15" fill="#6B6560">3층부터 기운다"</text>
  <rect x="812" y="212" width="448" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="832" y="270" font-size="17" font-weight="700" fill="#0F766E">프로덕션 규모</text>

  <!-- Row 3: 2025 -> 2026 -->
  <rect x="20" y="320" width="330" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="40" y="368" font-size="18" font-weight="700" fill="#1A1A18">2025 → 2026</text>
  <text x="40" y="392" font-size="14" fill="#6B6560">질문의 전환</text>
  <rect x="360" y="320" width="440" height="100" fill="#FFFFFF" stroke="#D4D0C8" stroke-width="1" rx="6"/>
  <text x="380" y="358" font-size="14" fill="#6B6560">2025</text>
  <text x="380" y="384" font-size="16" fill="#1A1A18">"AI가 동작하는 코드를</text>
  <text x="380" y="404" font-size="16" fill="#1A1A18">쓸 수 있는가"</text>
  <rect x="812" y="320" width="448" height="100" fill="#FAF3E6" stroke="#0F766E" stroke-width="1" rx="6"/>
  <text x="832" y="358" font-size="14" fill="#6B6560">2026</text>
  <text x="832" y="384" font-size="16" fill="#1A1A18">"프로덕션 배포를 어떻게</text>
  <text x="832" y="404" font-size="16" fill="#1A1A18">오케스트레이션하는가"</text>

  <!-- Convergence band -->
  <rect x="20" y="436" width="1240" height="134" fill="#FAF3E6" stroke="#0F766E" stroke-width="1.5" rx="6"/>
  <text x="44" y="468" font-size="19" font-weight="700" fill="#0F766E">수렴이라는 증거 — 서로 무관하게 만들어진 방법론들이 도달한 답이 동일했다</text>
  <text x="44" y="500" font-size="16" fill="#1A1A18">Superpowers · gstack · BMAD-METHOD · OpenSpec · Spec Kit</text>
  <text x="44" y="534" font-size="18" font-weight="700" fill="#1A1A18">research → plan → execute → review → ship <tspan font-weight="400" fill="#6B6560">+ 게이트마다 사람의 감독</tspan></text>
  <text x="44" y="560" font-size="14" fill="#6B6560">특정 회사의 주장이 아니라 독립 재발명의 수렴. 상시 파이프라인이 된 규모에는 구조(게이트)가 필요해진다.</text>
</svg>
