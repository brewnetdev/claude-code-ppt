<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 130" font-family="IBM Plex Sans KR, IBM Plex Sans, sans-serif" data-sae-id="e0001">
