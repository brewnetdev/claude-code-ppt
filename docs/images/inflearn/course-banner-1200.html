<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:781px;background:#0d0906;overflow:hidden}
  .frame{position:relative;width:1200px;height:781px;background:#1a110a;overflow:hidden;
    font-family:'JetBrains Mono','Noto Sans KR',monospace}

  /* ---- neon border (identical style to 960 version) ---- */
  .neon-base{position:absolute;inset:8px;border-radius:18px;border:3px solid rgba(240,135,62,.38);
    box-shadow:0 0 calc(8px + var(--glow)*13px) rgba(240,135,62,calc(.35 + var(--glow)*.4)),
               inset 0 0 calc(5px + var(--glow)*10px) rgba(240,135,62,calc(.12 + var(--glow)*.2));
    pointer-events:none}
  .neon-arc{position:absolute;inset:8px;border-radius:18px;padding:3px;
    background:conic-gradient(from var(--angle),
      rgba(240,135,62,0) 0deg, rgba(240,135,62,0) 24deg,
      rgba(240,135,62,.9) 46deg, #ffd9a8 56deg, rgba(240,135,62,.9) 66deg,
      rgba(240,135,62,0) 92deg, rgba(240,135,62,0) 360deg);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    filter:drop-shadow(0 0 7px rgba(240,135,62,.85)) drop-shadow(0 0 14px rgba(240,135,62,.5));
    pointer-events:none}

  /* ---- terminal (left) — scaled for 1200x781 ---- */
  .term{position:absolute;left:46px;top:56px;width:604px;height:668px;background:#1e140c;
    border:1px solid #3a2a1c;border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .term-bar{flex:0 0 54px;background:#170f09;border-bottom:1px solid #33261a;display:flex;
    align-items:center;padding:0 24px;gap:12px}
  .dot{width:16px;height:16px;border-radius:50%}
  .d1{background:#e8623f}.d2{background:#e6a23c}.d3{background:#3fb27f}
  .term-title{margin-left:18px;color:#8a7663;font-size:19px;letter-spacing:.2px}
  .term-body{flex:1;padding:30px 34px 24px;display:flex;flex-direction:column;min-height:0}

  .cmd-line{font-size:35px;line-height:1.2;white-space:nowrap;margin-bottom:22px}
  .prompt{color:#f0873e;font-weight:700;margin-right:16px}
  .cmd{color:#f3ead9}

  .comment{color:#6f5f4e;font-size:20px;margin-bottom:11px}
  .head{font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:55px;line-height:1.06;
    letter-spacing:-.5px}
  .head1{color:#f5efe6}
  .head2{color:#f0873e;margin-bottom:30px}

  .rows{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .row{display:flex;align-items:center;font-size:24px;line-height:1.3;white-space:nowrap}
  .chk{color:#f0873e;flex:0 0 auto;margin-right:18px;font-weight:700}
  .lbl{color:#8a7663;flex:0 0 112px}
  .val{color:#efe6d6;font-weight:700}
  .dots{flex:1;border-bottom:2px dotted #4a3b2c;margin:0 16px;transform:translateY(-6px)}
  .stat{color:#f0873e;flex:0 0 auto;font-weight:500}

  .foot{color:#6f5f4e;font-size:17px;margin-top:auto;white-space:nowrap;letter-spacing:-.2px}

  .cursor{display:inline-block;width:20px;height:40px;background:#f0873e;vertical-align:-6px;
    margin-left:4px;box-shadow:0 0 12px rgba(240,135,62,.7)}
  .cursor.small{width:16px;height:31px;vertical-align:-4px}
  .cursor.off{opacity:0}
  .hidden{visibility:hidden}

  /* ---- book (right, fully visible, clears neon) ---- */
  .book{position:absolute;right:56px;top:96px;height:560px;width:auto;
    filter:drop-shadow(-13px 18px 28px rgba(0,0,0,.55))}
</style></head>
<body>
<div class="frame" id="frame" style="--angle:0deg;--glow:0.5">
  <div class="term">
    <div class="term-bar">
      <span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span>
      <span class="term-title">~/claude-code — inflearn</span>
    </div>
    <div class="term-body">
      <div class="cmd-line"><span class="prompt">&#10095;</span><span class="cmd" id="cmd">claude --start</span><span class="cursor small" id="curCmd"></span></div>
      <div class="comment" id="cmt"># 초보자도 따라하는</div>
      <div class="head head1" id="h1">클로드 코드</div>
      <div class="head head2" id="h2">한방에 해결하기<span class="cursor" id="curHead"></span></div>
      <div class="rows">
        <div class="row" id="r0"><span class="chk">✓</span><span class="lbl">build</span><span class="val">markflow SaaS</span><span class="dots"></span><span class="stat">done</span></div>
        <div class="row" id="r1"><span class="chk">✓</span><span class="lbl">db</span><span class="val">Neon Postgres</span><span class="dots"></span><span class="stat">connected</span></div>
        <div class="row" id="r2"><span class="chk">✓</span><span class="lbl">deploy</span><span class="val">Vercel · Railway</span><span class="dots"></span><span class="stat">live</span></div>
        <div class="row" id="r3"><span class="chk">✓</span><span class="lbl">edge</span><span class="val">Cloudflare</span><span class="dots"></span><span class="stat">secured</span></div>
      </div>
      <div class="foot" id="foot"># 『클로드 코드 마스터』 저자 직강 · plan → build → ship</div>
    </div>
  </div>
  <img class="book" src="book-crop.png" alt="book">
  <div class="neon-base"></div>
  <div class="neon-arc" id="arc" style="--angle:0deg"></div>
</div>
<script>
  var CMD = 'claude --start';
  var STEP = { cmt:7, h1:7, h2:8, r0:10, r1:11, r2:12, r3:13, foot:14 };
  window.setFrame = function(i, N){
    var t = i / N;
    var frame = document.getElementById('frame'), arc = document.getElementById('arc');
    var glow = 0.5 + 0.5*Math.sin(2*Math.PI*t);
    var angle = (360*t).toFixed(1) + 'deg';
    frame.style.setProperty('--glow', glow.toFixed(3));
    frame.style.setProperty('--angle', angle);
    arc.style.setProperty('--angle', angle);
    var TYPE_END = 6;
    var cmd = document.getElementById('cmd'), curCmd = document.getElementById('curCmd');
    if (i <= TYPE_END) { var n = Math.round((i / TYPE_END) * CMD.length); cmd.textContent = CMD.slice(0, n); curCmd.classList.remove('off'); }
    else { cmd.textContent = CMD; curCmd.classList.add('off'); }
    for (var id in STEP) { document.getElementById(id).classList.toggle('hidden', i < STEP[id]); }
    var curHead = document.getElementById('curHead');
    if (i < STEP.h2) { curHead.classList.add('hidden'); }
    else { curHead.classList.remove('hidden'); var blink = Math.floor((i - STEP.h2) / 2) % 2; curHead.classList.toggle('off', i >= 15 && blink === 1); }
  };
</script>
</body></html>
