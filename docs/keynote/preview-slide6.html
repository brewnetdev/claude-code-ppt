<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>슬라이드 6 SVG 미리보기 — 컨텍스트 윈도우 구조</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=JetBrains+Mono:wght@400;600;700&amp;display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #F59E0B; --amber-d: #D97706; --blue: #60A5FA; --cyan: #22D3EE;
    --green: #34D399; --red: #F87171; --text: #F1F5F9; --muted: #94A3B8;
    --border: #1E293B; --bg: #0F172A;
  }
  body {
    background: #020617;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 40px 20px;
    display: flex; flex-direction: column; gap: 20px; align-items: center;
    color: var(--text);
  }
  .slide {
    position: relative;
    width: 1280px; height: 720px;
    background: var(--bg);
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
  }
  .slide-topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--amber) 0%, var(--amber-d) 40%, transparent 100%);
    z-index: 5;
  }
  .slide-logo {
    position: absolute; top: 28px; right: 40px;
    display: flex; align-items: center; gap: 8px; z-index: 10;
  }
  .slide-logo-url {
    font-size: 11px; font-weight: 500; color: #475569;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .02em;
    text-decoration: none; margin-right: 12px;
    border-right: 1px solid #1E293B; padding-right: 14px; line-height: 1;
  }
  .slide-logo-text {
    font-size: 13px; font-weight: 700; letter-spacing: .08em;
    color: var(--amber); font-family: 'JetBrains Mono', monospace;
  }
  .slide-inner {
    position: relative; z-index: 2; height: 100%;
    padding: 56px 72px 48px 72px;
    display: flex; flex-direction: column;
  }
  .t-chapter {
    font-size: 11px; font-weight: 700; letter-spacing: .18em;
    text-transform: uppercase; color: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .t-chapter::before {
    content: ''; display: inline-block;
    width: 20px; height: 2px; background: var(--amber);
  }
  .t-title {
    font-size: 36px; font-weight: 700; color: var(--text);
    line-height: 1.25; letter-spacing: -.02em; margin-bottom: 8px;
  }
  .t-caption {
    font-size: 14px; color: var(--muted); line-height: 1.6; margin-top: 4px;
  }
  .hl-amber { color: var(--amber); font-weight: 700; }
  .hl-cyan  { color: var(--cyan); font-weight: 700; }
  .arch-box {
    border: 1.5px dashed #334155;
    border-radius: 12px;
    padding: 16px 20px;
    background: #111827;
  }
  .slide-footer {
    position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 72px; z-index: 5;
    border-top: 1px solid #1E293B;
  }
  .slide-footer-left, .slide-footer-right {
    font-size: 11px; color: #475569;
    font-family: 'JetBrains Mono', monospace;
  }
  .preview-banner {
    color: #FCD34D;
    background: rgba(245,158,11,.10);
    border: 1px solid rgba(245,158,11,.40);
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: .04em;
  }
</style>
</head>
<body>
