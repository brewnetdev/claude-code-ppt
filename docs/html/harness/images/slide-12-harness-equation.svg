<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="하네스 등식과 OpenHarness 실측 스탯: 도구·지식·관찰·행동·권한 5개 구성요소와 11,733 LOC 등 5개 지표">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#59617a"/></marker>
  </defs>
  <style>
    .title{font-family:"IBM Plex Sans KR",sans-serif;font-size:30px;font-weight:700;fill:#282a36}
    .eqh{font-family:"IBM Plex Sans KR",sans-serif;font-size:24px;font-weight:700;fill:#282a36}
    .eqd{font-family:"IBM Plex Sans KR",sans-serif;font-size:20px;font-weight:500;fill:#59617a}
    .op{font-family:"JetBrains Mono",monospace;font-size:26px;font-weight:700;fill:#59617a}
    .eqcap{font-family:"IBM Plex Sans KR",sans-serif;font-size:20px;font-weight:500;fill:#59617a}
    .slabel{font-family:"IBM Plex Sans KR",sans-serif;font-size:22px;font-weight:700;fill:#282a36}
    .num{font-family:"JetBrains Mono",monospace;font-size:36px;font-weight:700;fill:#282a36}
    .numacc{font-family:"JetBrains Mono",monospace;font-size:36px;font-weight:700;fill:#644ac9}
    .unit{font-family:"IBM Plex Sans KR",sans-serif;font-size:21px;font-weight:500;fill:#282a36}
    .sub{font-family:"IBM Plex Sans KR",sans-serif;font-size:19px;font-weight:400;fill:#59617a}
    .foot{font-family:"IBM Plex Sans KR",sans-serif;font-size:20px;font-weight:400;fill:#59617a}
  </style>

  <text class="title" x="16" y="42">코드로 증명된 하네스 등식</text>

  <!-- Equation row: 5 component boxes joined by + -->
  <rect x="16"  y="64" width="176" height="120" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <rect x="214" y="64" width="176" height="120" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <rect x="412" y="64" width="176" height="120" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <rect x="610" y="64" width="176" height="120" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <rect x="808" y="64" width="176" height="120" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>

  <text class="eqh" x="104" y="114" text-anchor="middle">Tools</text>
  <text class="eqd" x="104" y="152" text-anchor="middle">파일·명령 실행</text>

  <text class="eqh" x="302" y="114" text-anchor="middle">Knowledge</text>
  <text class="eqd" x="302" y="152" text-anchor="middle">스킬·도메인 규칙</text>

  <text class="eqh" x="500" y="114" text-anchor="middle">Observation</text>
  <text class="eqd" x="500" y="152" text-anchor="middle">결과 확인·로그</text>

  <text class="eqh" x="698" y="114" text-anchor="middle">Action</text>
  <text class="eqd" x="698" y="152" text-anchor="middle">편집·커밋</text>

  <text class="eqh" x="896" y="114" text-anchor="middle">Permissions</text>
  <text class="eqd" x="896" y="152" text-anchor="middle">안전 경계</text>

  <text class="op" x="203" y="133" text-anchor="middle">+</text>
  <text class="op" x="401" y="133" text-anchor="middle">+</text>
  <text class="op" x="599" y="133" text-anchor="middle">+</text>
  <text class="op" x="797" y="133" text-anchor="middle">+</text>

  <text class="eqcap" x="500" y="212" text-anchor="middle">= 하네스: 모델을 제외한 실행 환경 전체</text>

  <!-- Stats -->
  <text class="slabel" x="16" y="256">OpenHarness 실측 스탯 · vs Claude Code(약 51만 줄)</text>

  <!-- Card 1 (headline, emphasis) -->
  <rect x="16" y="272" width="176" height="198" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/>
  <text class="numacc" x="104" y="346" text-anchor="middle">11,733</text>
  <text class="unit" x="104" y="386" text-anchor="middle">LOC</text>
  <text class="sub" x="104" y="418" text-anchor="middle">44× 경량</text>

  <!-- Card 2 -->
  <rect x="214" y="272" width="176" height="198" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <text class="num" x="302" y="346" text-anchor="middle">163</text>
  <text class="unit" x="302" y="386" text-anchor="middle">files</text>
  <text class="sub" x="302" y="418" text-anchor="middle">vs 1,884</text>

  <!-- Card 3 -->
  <rect x="412" y="272" width="176" height="198" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <text class="num" x="500" y="346" text-anchor="middle">43</text>
  <text class="unit" x="500" y="386" text-anchor="middle">tools</text>
  <text class="sub" x="500" y="418" text-anchor="middle">98% 커버</text>

  <!-- Card 4 -->
  <rect x="610" y="272" width="176" height="198" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <text class="num" x="698" y="346" text-anchor="middle">54</text>
  <text class="unit" x="698" y="386" text-anchor="middle">commands</text>
  <text class="sub" x="698" y="418" text-anchor="middle">61% 커버</text>

  <!-- Card 5 -->
  <rect x="808" y="272" width="176" height="198" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/>
  <text class="num" x="896" y="346" text-anchor="middle">4</text>
  <text class="unit" x="896" y="386" text-anchor="middle">확장점</text>
  <text class="sub" x="896" y="418" text-anchor="middle">Tool · Skill</text>
  <text class="sub" x="896" y="442" text-anchor="middle">Plugin · Hook</text>

  <text class="foot" x="16" y="508">11,733줄 코드로 "하네스란 무엇인가"를 증명한 교과서 — 테스트 114 unit + 6 E2E</text>
</svg>