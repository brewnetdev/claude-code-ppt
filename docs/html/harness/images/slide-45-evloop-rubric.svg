<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Evaluator Driven 평가 게이트 채점 루브릭 — 좌측 5축 배점 막대(exists·match·test 각 25점, contract 15점, no-regress 10점, test축 없으면 95점 불가), 우측 2렌즈 code-match(정적)·test-pass(실행)를 min으로 합쳐 항목 점수 산출, 낙관 편향 차단"><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#59617a"/></marker></defs><style>.ti{font-family:"IBM Plex Sans KR",sans-serif;font-size:30px;font-weight:700;fill:#282a36}.hd{font-family:"IBM Plex Sans KR",sans-serif;font-size:23px;font-weight:700;fill:#282a36}.ax{font-family:"IBM Plex Sans KR",sans-serif;font-size:22px;font-weight:600;fill:#282a36}.bd{font-family:"IBM Plex Sans KR",sans-serif;font-size:20px;font-weight:500;fill:#282a36}.eb{font-family:"IBM Plex Sans KR",sans-serif;font-size:18px;font-weight:500;fill:#59617a}.no{font-family:"IBM Plex Sans KR",sans-serif;font-size:19px;font-weight:400;fill:#59617a}.dg{font-family:"IBM Plex Sans KR",sans-serif;font-size:19px;font-weight:600;fill:#c93030}.ac{font-family:"IBM Plex Sans KR",sans-serif;font-size:22px;font-weight:700;fill:#644ac9}.mn{font-family:"JetBrains Mono",monospace;font-weight:700}.rs{font-family:"IBM Plex Sans KR",sans-serif;font-size:24px;font-weight:700;fill:#282a36}</style><text class="ti" x="40" y="54">채점 루브릭 — 5축 100점 · 2렌즈 min</text><line x1="40" y1="76" x2="960" y2="76" stroke="#d8dae5" stroke-width="1.5"/><line x1="585" y1="102" x2="585" y2="560" stroke="#d8dae5" stroke-width="1.5"/><text class="hd" x="48" y="126">5축 배점 · 합 100</text><rect x="180" y="145" width="275" height="34" rx="4" fill="#e2e4ec" stroke="#d8dae5" stroke-width="1.5"/><text class="ax" x="48" y="169">코드 실재</text><text class="mn" x="445" y="170" font-size="22" fill="#282a36" text-anchor="end">25</text><rect x="180" y="196" width="275" height="34" rx="4" fill="#e2e4ec" stroke="#d8dae5" stroke-width="1.5"/><text class="ax" x=