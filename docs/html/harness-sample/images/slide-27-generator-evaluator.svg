<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="자기 평가 vs 분리 평가: 좌측은 한 에이전트가 자기 출력에 체크하는 자기 평가 편향, 우측은 Generator에서 산출물, 독립 Evaluator, PASS/FAIL로 이어지는 분리 평가. 하단은 자기 리뷰에서 독립 리뷰어, 자동 검증으로 오르는 피드백 강도 3단 계단."><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#59617a"/></marker></defs><style>text{font-family:"IBM Plex Sans KR",sans-serif}.t{font-size:30px;font-weight:700;fill:#282a36}.ph{font-size:26px;font-weight:700;fill:#282a36}.h{font-size:23px;font-weight:700;fill:#282a36}.hs{font-size:25px;font-weight:700;fill:#282a36}.b{font-size:21px;font-weight:500;fill:#59617a}.cap{font-size:18px;font-weight:400;fill:#59617a}.dg{font-size:22px;font-weight:700;fill:#c93030}.ac{font-size:23px;font-weight:700;fill:#644ac9}.mono{font-family:"JetBrains Mono",monospace}</style><text class="t" x="24" y="42">자기 평가 vs 분리 평가</text><rect x="24" y="76" width="464" height="300" rx="8" fill="#ffffff" stroke="#c93030" stroke-width="2"/><text class="ph" x="48" y="120">자기 평가</text><rect x="112" y="150" width="288" height="96" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="hs" x="256" y="190" text-anchor="middle">한 에이전트</text><text class="b" x="256" y="220" text-anchor="middle">생성 → 자기 평가</text><path d="M400 172 C 444 160, 444 236, 400 224" fill="none" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><text class="cap" x="256" y="274" text-anchor="middle">자기 출력에 ✓ 스스로 체크</text><rect x="112" y="292" width="288" height="66" rx="8" fill="#ffffff" stroke="#c93030" stroke-width="2"/><text class="dg" x="256" y="320" text-anchor="middle">자기 평가 편향</text><text class="cap" x="256" y="344" text-anchor="middle">미흡해도 자신 있게 칭찬</text><rect x="512" y="76" width="464" height="300" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text class="ph" x="536" y="120">분리 평가</text><rect x="576" y="142" width="336" height="42" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="h" x="744" y="170" text-anchor="middle"><tspan class="mono">Generator</tspan> (Generator)</text><line x1="744" y1="184" x2="744" y2="200" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><rect x="576" y="202" width="336" height="42" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="h" x="744" y="230" text-anchor="middle">산출물</text><line x1="744" y1="244" x2="744" y2="260" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><rect x="576" y="262" width="336" height="42" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="h" x="744" y="290" text-anchor="middle">독립 <tspan class="mono">Evaluator</tspan> (Evaluator)</text><line x1="744" y1="304" x2="744" y2="320" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><rect x="576" y="322" width="336" height="44" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text class="ac" x="744" y="351" text-anchor="middle"><tspan class="mono">PASS / FAIL</tspan> 판정</text><text class="h" x="24" y="404">피드백 강도 3단<tspan class="b" dx="12">약 → 강</tspan></text><rect x="56" y="508" width="270" height="64" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="h" x="191" y="540" text-anchor="middle">자기 리뷰</text><text class="cap" x="191" y="562" text-anchor="middle">약 · 편향 존재</text><rect x="366" y="478" width="270" height="94" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="h" x="501" y="520" text-anchor="middle">독립 리뷰어</text><text class="cap" x="501" y="546" text-anchor="middle">중 · 수정 없이 관찰만</text><rect x="676" y="448" width="270" height="124" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text class="h" x="811" y="498" text-anchor="middle">자동 검증</text><text class="cap" x="811" y="524" text-anchor="middle">강 · 린터·테스트·타입</text><line x1="330" y1="540" x2="362" y2="524" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><line x1="640" y1="510" x2="672" y2="494" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/></svg>