<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="가드레일 실측 성능이 탐지 58.57퍼센트, 차단 37.26퍼센트 미만, 정상 과제 보존 2.31퍼센트 미만으로 급감하는 3단 막대와 proceed·refuse·update 3중 판정 폐쇄 루프 대안"><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#59617a"/></marker></defs><style>.tit{font-family:"IBM Plex Sans KR",sans-serif;fill:#282a36;font-weight:700}.hd{font-family:"IBM Plex Sans KR",sans-serif;fill:#282a36;font-weight:700}.bd{font-family:"IBM Plex Sans KR",sans-serif;fill:#282a36;font-weight:500}.mut{font-family:"IBM Plex Sans KR",sans-serif;fill:#59617a;font-weight:400}.num{font-family:"JetBrains Mono",monospace;font-weight:700}.wn{font-family:"JetBrains Mono",monospace;font-weight:700;fill:#ffffff}.dg{font-family:"JetBrains Mono",monospace;font-weight:700;fill:#c93030}.mono{font-family:"JetBrains Mono",monospace;font-weight:700}</style><text class="tit" x="30" y="46" font-size="30">가드레일: 실측 성능과 대안</text><line x1="520" y1="86" x2="520" y2="512" stroke="#d8dae5" stroke-width="1.5"/><text class="hd" x="40" y="102" font-size="24">실측 3단 급감 (TRIAD)</text><text class="hd" x="40" y="150" font-size="24">① 탐지 · recall</text><rect x="40" y="162" width="430" height="48" rx="8" fill="#59617a" stroke="#d8dae5" stroke-width="1.5"/><text class="wn" x="456" y="195" font-size="27" text-anchor="end">58.57%</text><text class="hd" x="40" y="250" font-size="24">② 차단 성공률</text><rect x="40" y="262" width="274" height="48" rx="8" fill="#59617a" stroke="#d8dae5" stroke-width="1.5"/><text class="wn" x="300" y="295" font-size="25" text-anchor="end">&lt;37.26%</text><text class="hd" x="40" y="350" font-size="24">③ 정상 과제 보존율</text><rect x="40" y="362" width="17" height="48" rx="4" fill="#c93030" stroke="#c93030" stroke-width="1.5"/><text class="dg" x="70" y="395" font-size="27" text-anchor="start">&lt;2.31%</text><text class="mut" x="40" y="452" font-size="19">탐지 → 차단 → 과제 보존, 단계마다 급감</text><text class="mut" x="40" y="484" font-size="18">출처: 프롬프트 인젝션 벤치마크 TRIAD</text><text class="hd" x="560" y="102" font-size="24">3중 판정 대안</text><rect x="560" y="190" width="165" height="68" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text class="hd" x="642" y="231" font-size="24" text-anchor="middle">가드레일 판정</text><line x1="725" y1="210" x2="750" y2="150" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><line x1="725" y1="224" x2="750" y2="224" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><line x1="725" y1="238" x2="750" y2="298" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><rect x="752" y="118" width="200" height="60" rx="8" fill="#ffffff" stroke="#1d8a45" stroke-width="2"/><text class="mono" x="766" y="146" font-size="24" fill="#1d8a45">proceed</text><text class="bd" x="766" y="169" font-size="20">정상 진행</text><rect x="752" y="194" width="200" height="60" rx="8" fill="#ffffff" stroke="#c93030" stroke-width="2"/><text class="mono" x="766" y="222" font-size="24" fill="#c93030">refuse</text><text class="bd" x="766" y="245" font-size="20">행동 거부</text><rect x="752" y="270" width="200" height="60" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text class="mono" x="766" y="298" font-size="24" fill="#644ac9">update</text><text class="bd" x="766" y="321" font-size="20">계획 수정</text><line x1="852" y1="330" x2="852" y2="374" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><rect x="560" y="376" width="392" height="80" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text class="hd" x="756" y="410" font-size="23" text-anchor="middle">구조화 피드백을</text><text class="hd" x="756" y="438" font-size="23" text-anchor="middle">컨텍스트에 주입</text><polyline points="560,416 542,416 542,224 560,224" fill="none" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><text class="mut" x="549" y="320" font-size="18" text-anchor="middle" transform="rotate(-90 549 320)">폐쇄 루프</text><text class="mut" x="560" y="490" font-size="18">이진 차단기가 아니라 평가 피드백 루프</text></svg>