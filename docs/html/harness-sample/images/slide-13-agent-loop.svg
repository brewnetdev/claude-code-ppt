<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Agent Loop 다이어그램: 모델 스트림에서 tool_use 분기, 예면 권한 검사·PreToolUse 훅·실행·PostToolUse 훅 파이프라인을 거쳐 결과를 모델로 되돌리고, 아니오면 종료로 빠진다"><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#59617a"/></marker></defs><style>text{fill:#282a36}.title{font-family:"IBM Plex Sans KR",sans-serif;font-size:30px;font-weight:700}.h{font-family:"IBM Plex Sans KR",sans-serif;font-size:24px;font-weight:700}.stg{font-family:"IBM Plex Sans KR",sans-serif;font-size:21px;font-weight:500}.mono{font-family:"JetBrains Mono",monospace;font-size:18px;fill:#59617a}.dec{font-family:"JetBrains Mono",monospace;font-size:24px;font-weight:700}.cap{font-family:"IBM Plex Sans KR",sans-serif;font-size:19px;font-weight:400;fill:#59617a}.pin{font-family:"IBM Plex Sans KR",sans-serif;font-size:20px;font-weight:700;fill:#644ac9}</style><text class="title" x="40" y="50">Agent Loop — 제약·검증이 주입되는 자리</text><rect x="70" y="128" width="210" height="74" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="h" x="175" y="162" text-anchor="middle">모델 스트림</text><text class="mono" x="175" y="188" text-anchor="middle">api.stream()</text><polygon points="475,107 567,165 475,223 383,165" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="dec" x="475" y="173" text-anchor="middle">tool_use?</text><rect x="810" y="128" width="150" height="74" rx="8" fill="#ffffff" stroke="#1d8a45" stroke-width="2"/><text class="h" x="885" y="162" text-anchor="middle">종료</text><text class="mono" x="885" y="188" text-anchor="middle">break</text><line x1="280" y1="165" x2="379" y2="165" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><line x1="567" y1="165" x2="806" y2="165" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><text class="cap" x="688" y="152" text-anchor="middle" fill="#1d8a45">아니