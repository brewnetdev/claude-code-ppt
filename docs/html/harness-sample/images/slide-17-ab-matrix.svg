<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 590" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="S0에서 S6까지 위반 유도 7종에 대한 CONTROL 대 HARNESS 행동 매트릭스와 효과 열. 결정적 4건 S1 S2 S4 S6 강조.">
  <style>
    text{font-family:"IBM Plex Sans KR",sans-serif;fill:#282a36}
    .m{font-family:"JetBrains Mono",monospace}
