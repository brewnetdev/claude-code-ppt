  <text x="334" y="123" font-size="24" font-weight="700"><tspan class="m">CONTROL</tspan> — 하네스 없음</text>
  <text x="656" y="123" font-size="24" font-weight="700"><tspan class="m">HARNESS</tspan> — 하네스 있음</text>
