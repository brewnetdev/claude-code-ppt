<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="성공 기준 한 문장이 프롬프트(지시)와 Eval(채점 기준) 두 형태로 갈라지는 다이어그램"><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#59617a"/></marker></defs><style>text{font-family:"IBM Plex Sans KR",sans-serif;}.t{fill:#282a36;}.m{fill:#59617a;}.a{fill:#644ac9;}</style><text class="t" x="24" y="44" font-size="30" font-weight="700">성공 기준 한 문장 — 두 용도</text><rect x="250" y="66" width="320" height="120" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text class="a" x="410" y="102" font-size="26" font-weight="700" text-anchor="middle">성공 기준</text><text class="t" x="410" y="138" font-size="22" font-weight="500" text-anchor="middle">규정 수치 정확 인용,</text><text class="t" x="410" y="168" font-size="22" font-weight="500" text-anchor="middle">규정 외 약속 금지</text><line x1="410" y1="186" x2="410" y2="208" stroke="#59617a" stroke-width="2"/><line x1="210" y1="208" x2="610" y2="208" stroke="#59617a" stroke-width="2"/><line x1="210" y1="208" x2="210" y2="246" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><line x1="610" y1="208" x2="610" y2="246" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><rect x="40" y="250" width="340" height="300" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="t" x="64" y="292" font-size="24" font-weight="700">프롬프트 · 지시</text><text class="m" x="64" y="318" font-size="18" font-weight="400">지시문 형태로</text><line x1="64" y1="334" x2="356" y2="334" stroke="#d8dae5" stroke-width="1.5"/><text class="t" x="64" y="378" font-size="22" font-weight="500">규정 수치를 정확히</text><text class="a" x="64" y="408" font-size="22" font-weight="700">인용하라.</text><text class="t" x="64" y="470" font-size="22" font-weight="500">규정에 없는 약속은</text><text class="a" x="64" y="500" font-size="22" font-weight="700">하지 마라.</text><rect x="440" y="250" width="340" height="300" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text class="t" x="464" y="292" font-size="24" font-weight="700">Eval · 채점 기준</text><text class="m" x="464" y="318" font-size="18" font-weight="400">채점 기준으로</text><line x1="464" y1="334" x2="756" y2="334" stroke="#d8dae5" stroke-width="1.5"/><text class="t" x="464" y="378" font-size="22" font-weight="500">규정 수치를 정확히</text><text class="a" x="464" y="408" font-size="22" font-weight="700">인용했는가?</text><text class="t" x="464" y="470" font-size="22" font-weight="500">규정 외 약속이</text><text class="a" x="464" y="500" font-size="22" font-weight="700">없는가?</text><text class="t" x="410" y="584" font-size="22" font-weight="500" text-anchor="middle">같은 문장, 두 용도</text></svg>