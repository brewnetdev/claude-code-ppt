<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="세 가지 변화(모델 상품화·프로덕션 진입·벤치마크 한계)가 하네스 엔지니어링으로 수렴하는 다이어그램"><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#59617a"/></marker></defs><style>.ttl{font-family:"IBM Plex Sans KR",sans-serif;font-size:30px;font-weight:700;fill:#282a36}.h{font-family:"IBM Plex Sans KR",sans-serif;font-size:24px;font-weight:700;fill:#282a36}.lbl{font-family:"IBM Plex Sans KR",sans-serif;font-size:21px;font-weight:500;fill:#282a36}.cap{font-family:"IBM Plex Sans KR",sans-serif;font-size:19px;font-weight:400;fill:#59617a}.num{font-family:"JetBrains Mono",monospace;font-size:20px;font-weight:700;fill:#59617a}.acc{font-family:"IBM Plex Sans KR",sans-serif;font-size:28px;font-weight:700;fill:#644ac9}.accsub{font-family:"IBM Plex Sans KR",sans-serif;font-size:20px;font-weight:500;fill:#282a36}</style><text x="24" y="46" class="ttl">왜 지금인가 — 세 가지 변화의 수렴</text><rect x="24" y="70" width="300" height="260" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text x="42" y="112" class="num">1</text><text x="200" y="110" text-anchor="middle" class="h">모델의 상품화</text><line x1="48" y1="142" x2="292" y2="160" stroke="#282a36" stroke-width="2"/><line x1="48" y1="162" x2="292" y2="162" stroke="#282a36" stroke-width="2"/><line x1="48" y1="182" x2="292" y2="164" stroke="#282a36" stroke-width="2"/><line x1="296" y1="156" x2="296" y2="168" stroke="#644ac9" stroke-width="3"/><text x="174" y="230" text-anchor="middle" class="lbl">Claude · GPT · Gemini</text><text x="174" y="256" text-anchor="middle" class="cap">벤치마크에서<tspan x="174" dy="1.25em">좁은 범위로 수렴</tspan></text><rect x="350" y="70" width="300" height="260" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text x="368" y="112" class="num">2</text><text x="516" y="110" text-anchor="middle" class="h">프로덕션 진입</text><line x1="500" y1="138" x2="500" y2="192" stroke="#59617a" stroke-width="2" stroke-dasharray="4 4"/><text x="452" y="156" text-anchor="middle" class="cap">실험</text><text x="552" y="156" text-anchor="middle" class="cap">프로덕션</text><line x1="418" y1="176" x2="586" y2="176" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><text x="500" y="230" text-anchor="middle" class="lbl">2026 · 실제 코드 작성</text><text x="500" y="256" text-anchor="middle" class="cap">'다운되면 안 된다'<tspan x="500" dy="1.25em">수준의 신뢰도 요구</tspan></text><rect x="676" y="70" width="300" height="260" rx="8" fill="#ffffff" stroke="#d8dae5" stroke-width="1.5"/><text x="694" y="112" class="num">3</text><text x="842" y="110" text-anchor="middle" class="h">벤치마크의 한계</text><text x="734" y="156" text-anchor="end" class="num">1</text><line x1="744" y1="150" x2="804" y2="150" stroke="#282a36" stroke-width="2"/><line x1="748" y1="144" x2="748" y2="156" stroke="#282a36" stroke-width="2"/><text x="734" y="194" text-anchor="end" class="num">100+</text><line x1="744" y1="188" x2="950" y2="188" stroke="#282a36" stroke-width="2"/><g stroke="#282a36" stroke-width="2"><line x1="748" y1="182" x2="748" y2="194"/><line x1="761" y1="182" x2="761" y2="194"/><line x1="774" y1="182" x2="774" y2="194"/><line x1="787" y1="182" x2="787" y2="194"/><line x1="800" y1="182" x2="800" y2="194"/><line x1="813" y1="182" x2="813" y2="194"/><line x1="826" y1="182" x2="826" y2="194"/><line x1="839" y1="182" x2="839" y2="194"/><line x1="852" y1="182" x2="852" y2="194"/><line x1="865" y1="182" x2="865" y2="194"/><line x1="878" y1="182" x2="878" y2="194"/><line x1="891" y1="182" x2="891" y2="194"/><line x1="904" y1="182" x2="904" y2="194"/><line x1="917" y1="182" x2="917" y2="194"/><line x1="930" y1="182" x2="930" y2="194"/><line x1="943" y1="182" x2="943" y2="194"/></g><text x="826" y="230" text-anchor="middle" class="lbl">단일 턴 vs 수백 단계</text><text x="826" y="256" text-anchor="middle" class="cap">50단계 후 방향 이탈에<tspan x="826" dy="1.25em">1% 향상은 무의미</tspan></text><line x1="174" y1="336" x2="486" y2="464" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><line x1="500" y1="336" x2="500" y2="464" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><line x1="826" y1="336" x2="514" y2="464" stroke="#59617a" stroke-width="2" marker-end="url(#ar)"/><rect x="340" y="470" width="320" height="88" rx="8" fill="#ffffff" stroke="#644ac9" stroke-width="2"/><text x="500" y="510" text-anchor="middle" class="acc">하네스 엔지니어링</text><text x="500" y="540" text-anchor="middle" class="accsub">모델을 감싸는 시스템</text></svg>