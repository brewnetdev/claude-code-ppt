# Deploy the static HTML under docs/html/ as the GitHub Pages site root.
# docs/html is the artifact root, so published URLs drop the docs/html prefix
# (e.g. docs/html/interview/foo.html -> /interview/foo.html).
name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/html/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html
      - id: deployment
        uses: actions/deploy-pages@v4
